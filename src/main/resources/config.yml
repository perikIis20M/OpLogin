# OpLogin Configuration
# Password hashes and trusted IPs are stored below. Do not edit them manually.

security:
  # Legacy AES key used only to migrate old encrypted passwords on successful login.
  encryption-key: ''
  min-password-length: 8
  max-login-attempts: 3
  block-duration: 15
  enable-ip-auto-login: true
  unlock-duration-seconds: 300
  log-failed-attempts: true
  auto-lock-ops-on-join: true
  pin-mode:
    enabled: false
    length: 4
    title: '&8OpLogin PIN'
  # Internal marker used to detect auth mode changes. Do not edit manually.
  auth-mode-marker: password

protection:
  block-default-op-permissions: true
  auto-logout-after-sensitive-command: true
  blocked-permission-patterns:
    - '*'
    - minecraft.command.*
    - bukkit.command.*
    - minecraft.admin.*
    - paper.command.*
    - minecraft.commandblock.*
    - luckperms.*
    - permissions.*
    - pex.*
  sensitive-commands:
    - op
    - deop
    - stop
    - reload
    - ban
    - ban-ip
    - pardon
    - pardon-ip
    - kick
    - whitelist
    - lp
    - luckperms
    - pex
    - permissions
    - minecraft:op
    - minecraft:deop
    - minecraft:stop
    - minecraft:reload
    - minecraft:ban
    - minecraft:pardon
    - bukkit:stop
    - bukkit:reload

messages:
  prefix: '&8[&bOpLogin&8] &7'
  login-success: '&aLogin successful! Operator privileges unlocked.'
  login-failed: '&cIncorrect password.'
  already-logged: '&cYou are already logged in.'
  no-password: '&cYou do not have a password set. Ask an administrator to set one.'
  console-only: '&cThis command can only be executed from the console.'
  player-only: '&cThis command can only be used by players.'
  op-only: '&cThis command is only for server operators.'
  login-prompt: '&eType your password in chat. It will not be shown.'
  awaiting-password: '&ePassword entry already pending. Type it in chat.'
  command-password-disabled: '&cDo not put credentials in the command. Use /oplogin with no arguments.'
  logout-success: '&eOperator privileges locked.'
  pin-opened: '&ePIN keypad opened. Click the digits to unlock operator privileges.'
  pin-numeric-only: '&cPin mode is enabled. Credentials must contain only digits.'
  pin-length-invalid: '&cPin mode is enabled. Credentials must be exactly %length% digits long.'
  pin-closed: '&ePIN entry cancelled.'
  password-set: '&aPassword set for %player%.'
  password-reset: '&aPassword reset for %player%.'
  config-reloaded: '&aOpLogin configuration reloaded successfully.'
  too-short-password: '&cPassword must be at least %length% characters long.'
  too-many-attempts: '&cToo many failed attempts. Try again in %minutes% minutes.'
  auto-login: '&aAuto-login successful from your trusted IP.'
  already-locked: '&eYour operator privileges are already locked.'
  must-login: '&cOperator privileges are locked. Use /oplogin.'
  locked-on-join: '&eYour operator privileges are locked until you authenticate.'
  auto-locked: '&eYour operator privileges have been locked again.'
  sensitive-command-blocked: '&cThat command is always blocked until you log in.'
  sensitive-command-logout: '&eSensitive command used. Operator privileges locked again.'
  lockdown-executed: '&eAll online operators have been returned to the locked state.'

passwords: {}
trusted-ips: {}
